version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: medicineapp_db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: medicineapp
      POSTGRES_PASSWORD: medicineapp_dev_2026
      POSTGRES_DB: medicineapp
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medicineapp"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
